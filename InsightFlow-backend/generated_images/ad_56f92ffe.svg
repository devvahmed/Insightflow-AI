<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#99f6e4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#99f6e4;stop-opacity:0.0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Glow blob center -->
  <circle cx="512" cy="512" r="400" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Decorative rings -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#99f6e4" stroke-width="1.5" stroke-opacity="0.2"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#99f6e4" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Top badge -->
  <rect x="312" y="80" width="400" height="48" rx="24" fill="#99f6e4" fill-opacity="0.15" stroke="#99f6e4" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="512" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#99f6e4" letter-spacing="3">INSIGHTFLOW AI × PAKISTAN</text>

  <!-- Product emoji (large) -->
  <text x="512" y="460" text-anchor="middle" font-size="200">🧼</text>

  <!-- Product label -->
  <text x="512" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="#ffffff" letter-spacing="1">PREMIUM PRODUCT</text>

  <!-- Tagline -->
  <text x="512" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#99f6e4" font-style="italic">Feel Fresh, Feel Confident</text>

  <!-- Discount badge -->
  <circle cx="512" cy="730" r="90" fill="#99f6e4" fill-opacity="0.9"/>
  <text x="512" y="718" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#134e4a">15%</text>
  <text x="512" y="755" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#134e4a">OFF</text>

  <!-- CTA button -->
  <rect x="282" y="860" width="460" height="72" rx="36" fill="#99f6e4"/>
  <text x="512" y="902" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#134e4a">ABHI ORDER KAREIN! 🚀</text>

  <!-- Bottom stars -->
  <text x="160" y="980" text-anchor="middle" font-size="24">⭐⭐⭐⭐⭐</text>
  <text x="512" y="985" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#99f6e4" fill-opacity="0.7">Pakistan's #1 Trusted Brand</text>
  <text x="860" y="980" text-anchor="middle" font-size="24">🇵🇰</text>
</svg>